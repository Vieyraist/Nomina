<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- 📱 RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agregar Empleado</title>

    <!-- 🎨 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: #f4f6f9;
        }

        .container {
            max-width: 600px;
        }

        .card {
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: none;
        }

        input, select {
            border-radius: 10px !important;
            height: 45px;
        }

        .btn {
            border-radius: 10px;
            padding: 10px;
        }

        /* quitar flechas number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        /* 📱 MOBILE */
        @media (max-width: 768px) {

            .container {
                max-width: 100%;
            }

            .card {
                padding: 20px !important;
            }

        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">
            <img src="{{ url_for('static', filename='img/pasi.png') }}" style="height: 40px;">
            <div>
                <h5 class="fw-bold mb-0">Agregar empleado</h5>
                <small class="text-muted">Registro de personal</small>
            </div>
        </div>

        <a href="/" class="btn btn-dark btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>

    </div>

    <!-- FORM -->
    <form method="POST">

    <div class="card p-4">

        <div class="mb-3">
            <label class="form-label">Obra</label>
            <select name="zona" class="form-control" required>
                <option value="">Seleccionar Obra</option>
                <option>Guadalajara</option>
                <option>Celaya</option>
                <option>Salamanca</option>
                <option>Querétaro</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Puesto</label>
            <input type="text" name="puesto" class="form-control" placeholder="Ej. Pintor" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Salario</label>
            <input type="number" step="0.01" name="salario" class="form-control" placeholder="Ej. 0000" required>
        </div>

        <!-- BOTONES -->
        <div class="d-flex justify-content-between mt-3">

            <a href="/" class="btn btn-outline-secondary">
                Cancelar
            </a>

            <button class="btn btn-success px-4">
                <i class="bi bi-save-fill"></i> Guardar
            </button>

        </div>

    </div>

    </form>

</div>

</body>
</html>
