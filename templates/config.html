<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
	/* Quitar flechas en Chrome, Edge, Safari */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Quitar flechas en Firefox */
input[type=number] {
    -moz-appearance: textfield;
}
    </style>


</head>
<body>

<div class="container mt-4" style="max-width: 400px;">
    <h3>⚙️ Configuración de Tarifas</h3>

    <form method="POST">
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>Puesto</th>
                    <th>Tarifa Hora Extra</th>
                </tr>
            </thead>
            <tbody>
                {% for puesto, valor in tarifas.items() %}
                <tr>
					<td>{{ puesto.capitalize() }}</td>                   
					<td>
                        <input type="number" step="0.1" name="{{ puesto }}" value="{{ valor }}" class="form-control">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button class="btn btn-success">Guardar</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </form>
</div>

</body>
</html>
