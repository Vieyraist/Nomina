<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body {
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    border: none;
    width: 100%;
    max-width: 380px;
    padding: 25px;
}

/* LOGO */
.logo-login {
    height: 42px;
    object-fit: contain;
}

/* INPUTS */
.form-control {
    border-radius: 10px;
    height: 45px;
}

/* BOTON */
.btn-primary {
    border-radius: 10px;
    height: 45px;
    font-weight: 500;
}

/* ICONO PASSWORD */
.password-toggle {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
    color: #666;
}

.input-group-custom {
    position: relative;
}

/* ERROR */
.alert {
    font-size: 14px;
    padding: 8px;
    margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="card text-center">

    <!-- LOGO -->
    <img src="{{ url_for('static', filename='img/pasi.png') }}" class="logo-login mb-3">

    <!-- TITULOS -->
    <h5 class="fw-bold mb-1">Sistema de Nómina Interno</h5>
    <div class="text-muted mb-3">Login</div>

    <!-- ERROR -->
    {% if error %}
    <div class="alert alert-danger">
        Usuario o contraseña incorrectos
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST">

        <input name="username" class="form-control mb-3" placeholder="Usuario" required>

        <div class="input-group-custom mb-3">
            <input type="password" name="password" id="password" class="form-control" placeholder="Contraseña" required>
            <i class="bi bi-eye-slash password-toggle" onclick="togglePassword()"></i>
        </div>

        <button class="btn btn-primary w-100">
            Entrar
        </button>

    </form>

</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.querySelector(".password-toggle");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        input.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

</body>
</html>
