<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Empleados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
	.input-zona {
    width: 120px;
}

.input-puesto {
    width: 140px;
}
	
	table { width: 100%; border-collapse: collapse; }
  th { text-align: center; background-color: #f2f2f2; }
  td { text-align: left; } /* Opcional: alinear datos diferente */
	
        body {
            background: #f4f6f9;
        }

        .container {
            max-width: 1100px;
        }

        .card {
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: none;
        }

        table th {
            background: linear-gradient(45deg, #0a2a66, #0d3c91);
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: none;
        }
.table th {
    color: #ffffff !important;
}

        .table {
            border-radius: 12px;
            overflow: hidden;
        }

        table th:first-child {
            border-top-left-radius: 12px;
        }

        table th:last-child {
            border-top-right-radius: 12px;
        }

        .table tbody tr:hover {
            background-color: #f1f3f5;
            transition: 0.2s;
        }

        input {
            border-radius: 8px !important;
            border: 1px solid #dcdcdc !important;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.1);
        }

        .input-sm {
            width: 80px;
            text-align: center;
            margin: auto;
        }

        /* Quitar flechas */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h3 class="fw-bold mb-0">👤 Empleados</h3>
            <small class="text-muted">Gestión y configuración</small>
        </div>

        <div>
            <a href="/" class="btn btn-dark">⬅ Volver</a>
        </div>

    </div>

    <form method="POST">

    <div class="card p-4">

        <div class="table-responsive">
        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Zona</th>
                    <th>Puesto</th>
                    <th>Nombre</th>
                    <th>Salario</th>
                    <th>Tarifa H.E.</th>
					<th> </th>
                </tr>
            </thead>

            <tbody>
                {% for emp in empleados %}
                <tr>

                    <td>
                        <input type="text"
                               name="zona_{{ emp.id }}"
                               value="{{ emp.zona }}"
                               class="form-control input-zona">
                    </td>

                    <td>
                        <input type="text"
                               name="puesto_{{ emp.id }}"
                               value="{{ emp.puesto }}"
                               class="form-control input-puesto">
                    </td>

                    <td>
                        <input type="text"
                               name="nombre_{{ emp.id }}"
                               value="{{ emp.nombre }}"
                               class="form-control">
                    </td>

                    <td>
                        <input type="number" step="1" min="0"
                               name="salario_{{ emp.id }}"
                               value="{{ emp.salario }}"
                               class="form-control input-sm fw-bold text-success">
                    </td>

                    <td>
                        <input type="number" step="1" min="0"
                               name="tarifa_{{ emp.id }}"
                               value="{{ emp.tarifa }}"
                               class="form-control input-sm fw-bold">
                    </td>
						<td>
    <button type="button"
            class="btn btn-danger btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#modalEliminar{{ emp.id }}">
        Baja
    </button>
</td>
				<div class="modal fade" id="modalEliminar{{ emp.id }}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">⚠️ Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                ¿Eliminar a <strong>{{ emp.nombre }}</strong>?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <a href="/eliminar/{{ emp.id }}" class="btn btn-danger">
                    Sí, eliminar
                </a>
            </div>

        </div>
    </div>
</div>


                </tr>
                {% endfor %}
            </tbody>

        </table>
        </div>

        <div class="text-end mt-3">
            <button class="btn btn-success btn-lg px-4">
                💾 Guardar cambios
            </button>
        </div>

    </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
