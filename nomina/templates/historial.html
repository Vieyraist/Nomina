<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Nóminas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        table th {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📂 Historial de Nóminas</h3>
        <a href="/" class="btn btn-secondary">⬅ Volver</a>
    </div>

    <div class="card p-4">

        <div class="table-responsive">
        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Archivo</th>
                    <th style="width: 200px;">Acciones</th>
                </tr>
            </thead>

            <tbody>
                {% for archivo in archivos %}
                <tr>
                    <td>{{ archivo }}</td>

                    <td>
                        <a href="/descargar/{{ archivo }}" class="btn btn-success btn-sm">
                            Descargar
                        </a>

                        <!-- BOTON ELIMINAR -->
                        <button class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#modalEliminar{{ loop.index }}">
                            Eliminar
                        </button>
                    </td>
                </tr>

                <!-- MODAL -->
                <div class="modal fade" id="modalEliminar{{ loop.index }}" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">

                            <div class="modal-header bg-danger text-white">
                                <h5 class="modal-title">⚠️ Confirmar eliminación</h5>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body">
                                ¿Eliminar este archivo?
                                <br><strong>{{ archivo }}</strong>
                            </div>

                            <div class="modal-footer">
                                <button class="btn btn-secondary" data-bs-dismiss="modal">
                                    Cancelar
                                </button>

                                <a href="/eliminar_nomina/{{ archivo }}" class="btn btn-danger">
                                    Sí, eliminar
                                </a>
                            </div>

                        </div>
                    </div>
                </div>

                {% endfor %}
            </tbody>

        </table>
        </div>

        {% if archivos|length == 0 %}
        <div class="text-center text-muted mt-3">
            No hay nóminas generadas aún.
        </div>
        {% endif %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
