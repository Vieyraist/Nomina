<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nómina Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
	
		table { width: 100%; border-collapse: collapse; }
  th { text-align: center; background-color: #f2f2f2; }
  td { text-align: left; } /* Opcional: alinear datos diferente */
		
		.table th {
			color: #ffffff !important;
		}

		
        body {
            background: #f4f6f9;
        }

        .container {
            max-width: 1100px;
        }

        .card {
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: none;
        }

        /* HEADER TABLA */
        table th {
            background: linear-gradient(45deg, #0a2a66, #0d3c91);
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: none;
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }

        table th:first-child {
            border-top-left-radius: 12px;
        }

        table th:last-child {
            border-top-right-radius: 12px;
        }

        .table tbody tr:hover {
            background-color: #f1f3f5;
            transition: 0.2s;
        }

        /* INPUTS */
        input {
            border-radius: 8px !important;
            border: 1px solid #dcdcdc !important;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.1);
        }

        /* INPUT PEQUEÑO */
        .input-sm {
            width: 80px;
            text-align: center;
            margin: auto;
        }

        /* Quitar flechas */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        img {
            object-fit: contain;
        }

        .dropdown-menu {
            z-index: 1055 !important;
        }

    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">
            <img src="{{ url_for('static', filename='img/pasi.png') }}" style="height: 45px;">
            <div>
                <h3 class="fw-bold mb-0">Sistema de Nómina</h3>
                <small class="text-muted">Gestión semanal</small>
            </div>
        </div>

        <div class="dropdown">
            <button class="btn btn-dark dropdown-toggle" data-bs-toggle="dropdown">
                ⚙️ Menú
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/empleados">👤 Empleados</a></li>
                <li><a class="dropdown-item" href="/agregar_empleado">➕ Agregar empleado</a></li>
                <li><a class="dropdown-item" href="/historial">📂 Historial</a></li>
            </ul>
        </div>

    </div>

    <!-- FORM -->
    <form method="POST" action="/generar">

    <div class="card p-4">

        <div class="table-responsive">
        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Obra</th>
                    <th>Puesto</th>
                    <th>Empleado</th>
                    <th>Salario</th>
                    <th>Tiempo Extra</th>
                    <th>Otros</th>
                    <th>Deducciones</th>
                </tr>
            </thead>

            <tbody>
                {% for emp in empleados %}
                <tr>

                    <td>{{ emp.zona }}</td>
                    <td>{{ emp.puesto }}</td>
                    <td>{{ emp.nombre }}</td>

                    <td class="fw-semibold text-success">
                        ${{ emp.salario }}
                    </td>

                    <td>
                        <input type="number" step="0.1" name="horas_{{ emp.id }}" class="form-control input-sm">
                    </td>

                    <td>
                        <input type="number" step="0.1" name="otros_{{ emp.id }}" class="form-control input-sm">
                    </td>

                    <td>
                        <input type="number" step="0.1" name="desc_{{ emp.id }}" class="form-control input-sm">
                    </td>

                </tr>


                {% endfor %}
            </tbody>

        </table>
        </div>

        <div class="text-end mt-3">
            <button class="btn btn-primary btn-lg px-4">
                Generar Nómina
            </button>
        </div>

    </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
