<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h3>➕ Agregar empleado</h3>

    <form method="POST" class="row g-3 mt-3">

        <div class="col-md-3">
            <select name="zona" class="form-control" required>
                <option value="">Guadalajara</option>
                <option>Celaya</option>
                <option>Salamanca</option>
                <option>Querétaro</option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="text" name="puesto" class="form-control" placeholder="Puesto" required>
        </div>

        <div class="col-md-3">
            <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
        </div>

        <div class="col-md-3">
            <input type="number" step="0.01" name="salario" class="form-control" placeholder="Salario" required>
        </div>

        <div class="col-12">
            <button class="btn btn-success">Guardar</button>
            <a href="/" class="btn btn-secondary">Volver</a>
        </div>

    </form>

</div>

</body>
</html>
